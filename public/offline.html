<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Tijarah – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1e293b;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #F59E0B;
    }
    p {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 28px;
      line-height: 1.5;
    }
    button {
      background: #F59E0B;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img class="icon" src="/icons/192.png" alt="Tijarah" onerror="this.style.display='none'" />
  <h1>You're offline</h1>
  <p>Please check your internet connection<br>and try again.</p>
  <button onclick="window.location.reload()">Retry</button>
</body>
</html>
